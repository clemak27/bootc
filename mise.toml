[tools]
actionlint = "1.7.12"
cosign = "3.0.5"
shellcheck = "0.11.0"
yamllint = "1.38.0"

[env]
REGISTRY = "ghcr.io/clemak27"
IMAGE_TAG = "latest"

[tasks.lint]
run = """
actionlint
shellcheck ./build/*.sh
yamllint .
"""

## dankfedora

[tasks."dankfedora:build-image"]
run = """
docker build -t ${REGISTRY}/dankfedora:${IMAGE_TAG} . -f ./Containerfile.dankfedora
"""

[tasks."dankfedora:run-vm"]
depends = "build-image:dankfedora"
run = """
rm -rf ./output
mkdir -p ./output
podman run \
    --rm \
    -it \
    --privileged \
    --pull=newer \
    --security-opt label=type:unconfined_t \
    -v ./vm.toml:/config.toml:ro \
    -v ./output:/output \
    -v ~/.local/share/containers/storage:/var/lib/containers/storage \
    quay.io/centos-bootc/bootc-image-builder:latest \
    --in-vm \
    --type qcow2 \
    --use-librepo=True \
    --rootfs btrfs \
    ${REGISTRY}/dankfedora:${IMAGE_TAG}
qemu-kvm -cpu host -m 8G -device virtio-vga-gl -display gtk,gl=on ./output/qcow2/disk.qcow2
"""

[tasks."dankfedora:build-iso"]
run = """
image=${REGISTRY}/dankfedora:${IMAGE_TAG}
sudo podman build -t $image . -f ./Containerfile.dankfedora
rm -rf ./output
mkdir -p ./output
sudo podman run \
    --rm \
    -it \
    --privileged \
    --pull=newer \
    --security-opt label=type:unconfined_t \
    -v ./iso.toml:/config.toml:ro \
    -v ./output:/output \
    -v /var/lib/containers/storage:/var/lib/containers/storage \
    quay.io/centos-bootc/bootc-image-builder:latest \
    build \
    --type anaconda-iso \
    --use-librepo=True \
    --rootfs btrfs \
    $image
sudo chown ${USER}:users -R ./output
"""

